<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Word Dodge — English–BM Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #050d1c;
      --bg2:     #0a1a2e;
      --correct: #00f0c0;
      --wrong:   #ff2d55;
      --gold:    #ffc107;
      --dim:     #2a4060;
      --text:    #c8dff0;
      --gc: 0 0 18px #00f0c0, 0 0 40px #00f0c040;
      --gw: 0 0 18px #ff2d55, 0 0 40px #ff2d5540;
      --gg: 0 0 18px #ffc107, 0 0 40px #ffc10740;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── WRAPPER ── */
    #game-wrapper {
      position: relative;
      width: min(460px, 100vw);
      height: min(720px, 100dvh);
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
      border: 1px solid var(--dim);
      box-shadow: 0 0 60px rgba(0,240,192,0.08);
    }

    /* ── SCREENS ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 28px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      overflow-y: auto;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ===========================
       MENU SCREEN
    =========================== */
    #menu-screen { background: var(--bg); justify-content: center; }

    .title-block { text-align: center; }
    .title-main {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(24px, 6vw, 34px);
      color: var(--correct);
      text-shadow: var(--gc);
      line-height: 1.5;
      letter-spacing: 4px;
    }
    .title-sub {
      margin-top: 10px;
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      align-self: flex-start;
    }

    .diff-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }
    .diff-btn {
      padding: 14px 6px;
      border: 2px solid var(--dim);
      background: transparent;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      transition: all 0.2s;
      color: var(--dim);
    }
    .diff-btn .di { font-size: 22px; line-height: 1; }
    .diff-btn .ds { font-size: 8px; opacity: 0.65; font-weight: 400; }
    .diff-btn.easy   { --dc: var(--correct); }
    .diff-btn.medium { --dc: var(--gold); }
    .diff-btn.hard   { --dc: var(--wrong); }
    .diff-btn:hover, .diff-btn.sel {
      border-color: var(--dc);
      color: var(--dc);
      background: color-mix(in srgb, var(--dc) 10%, transparent);
      box-shadow: 0 0 16px color-mix(in srgb, var(--dc) 40%, transparent);
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: 2px solid var(--correct);
      color: var(--correct);
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 0.2s;
      box-shadow: var(--gc);
    }
    .start-btn:hover { background: var(--correct); color: var(--bg); }
    .start-btn:active { transform: scale(0.98); }

    .hint-box {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--dim);
      background: var(--bg2);
      font-size: 9px;
      color: #5a7a9a;
      letter-spacing: 1px;
      line-height: 2.2;
      text-align: center;
    }
    .hint-box span { color: var(--text); }

    .best-score {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ===========================
       GAME SCREEN
    =========================== */
    #game-screen { padding: 0; justify-content: flex-start; gap: 0; }

    /* HUD */
    #hud {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--dim);
      flex-shrink: 0;
    }
    #score-el {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--gold);
      text-shadow: var(--gg);
    }
    #diff-badge {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid;
      text-align: center;
    }
    #lives-el {
      font-size: 16px;
      letter-spacing: 3px;
      text-align: right;
    }

    /* Play area */
    #play-area {
      flex: 1;
      position: relative;
      width: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 100%, #061428 0%, var(--bg) 70%);
    }

    /* Grid lines for depth */
    #play-area::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--dim) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.12;
      pointer-events: none;
    }

    /* Center divider */
    #divider {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom, transparent 0%, var(--dim) 30%, var(--dim) 70%, transparent 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* Zone labels */
    .zone-lbl {
      position: absolute;
      bottom: 100px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      z-index: 6;
      pointer-events: none;
      text-transform: uppercase;
    }
    #lbl-correct {
      left: 14px;
      color: var(--correct);
      text-shadow: var(--gc);
    }
    #lbl-wrong {
      right: 14px;
      color: var(--wrong);
      text-shadow: var(--gw);
    }

    /* Zone highlight at bottom */
    #zone-hl {
      position: absolute;
      bottom: 0;
      width: 50%;
      height: 90px;
      pointer-events: none;
      z-index: 4;
      transition: left 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #zone-hl.left  { left: 0;   background: linear-gradient(to top, rgba(0,240,192,0.12), transparent); }
    #zone-hl.right { left: 50%; background: linear-gradient(to top, rgba(255,45,85,0.12), transparent); }

    /* Player */
    #player {
      position: absolute;
      bottom: 16px;
      width: 56px;
      height: 56px;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      transition: left 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: translateX(-50%);
    }
    #player svg { width: 56px; height: 56px; }
    #player.on-correct { left: 25%; color: var(--correct); filter: drop-shadow(0 0 6px var(--correct)) drop-shadow(0 0 14px var(--correct)); }
    #player.on-wrong   { left: 75%; color: var(--wrong);   filter: drop-shadow(0 0 6px var(--wrong))   drop-shadow(0 0 14px var(--wrong)); }
    #player { transition: left 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.15s, filter 0.15s; }
    @keyframes crossSpin { from { transform: rotate(0deg); } to { transform: rotate(45deg); } }
    #player.spinning svg { animation: crossSpin 0.18s ease forwards, crossPulse 1.6s ease-in-out 0.18s infinite; }

    /* Falling word cards */
    .word-card {
      position: absolute;
      background: var(--bg2);
      border: 1.5px solid var(--dim);
      padding: 9px 14px;
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
      transform: translateX(-50%);
      z-index: 8;
      pointer-events: none;
      line-height: 1.5;
    }
    .word-card .eng { color: #fff; font-size: 15px; font-weight: bold; }
    .word-card .sep { color: var(--dim); margin: 0 5px; }
    .word-card .bm  { color: var(--gold); }

    /* Flash overlay */
    #flash {
      position: absolute; inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.08s;
    }

    /* Countdown overlay */
    #countdown-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(5,13,28,0.85);
      z-index: 50;
      font-family: 'Press Start 2P', monospace;
      font-size: 60px;
      color: var(--correct);
      text-shadow: var(--gc);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    /* Mobile controls */
    #mobile-ctrl {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex-shrink: 0;
      border-top: 1px solid var(--dim);
    }
    .ctrl-btn {
      padding: 18px 12px;
      border: none;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      transition: background 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ctrl-btn .ci { font-size: 20px; }
    .ctrl-btn .ck { font-size: 8px; opacity: 0.5; font-weight: 400; letter-spacing: 1px; }
    #btn-l {
      background: rgba(0,240,192,0.06);
      color: var(--correct);
      border-right: 1px solid var(--dim);
    }
    #btn-l:active { background: rgba(0,240,192,0.18); }
    #btn-r {
      background: rgba(255,45,85,0.06);
      color: var(--wrong);
    }
    #btn-r:active { background: rgba(255,45,85,0.18); }

    /* ===========================
       FEEDBACK POPUPS
    =========================== */
    .fb-pop {
      position: absolute;
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      pointer-events: none;
      z-index: 30;
      transform: translateX(-50%);
      animation: fbAnim 0.7s forwards;
    }
    @keyframes fbAnim {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(0.8); }
      30%  { opacity: 1; transform: translateX(-50%) translateY(-20px) scale(1.1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-70px) scale(1); }
    }

    /* ===========================
       GAME OVER SCREEN
    =========================== */
    #gameover-screen {
      background: var(--bg);
      justify-content: flex-start;
      padding: 24px 28px;
      gap: 14px;
    }

    .go-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 4vw, 22px);
      color: var(--wrong);
      text-shadow: var(--gw);
      text-align: center;
      margin-top: 8px;
    }
    .go-score-wrap { text-align: center; }
    .go-lbl { font-size: 9px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }
    .go-score {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(28px, 8vw, 40px);
      color: var(--gold);
      text-shadow: var(--gg);
      margin-top: 4px;
    }
    .go-hs {
      font-size: 9px;
      letter-spacing: 2px;
      text-align: center;
      padding: 6px 0;
    }

    .review-section {
      width: 100%;
      border: 1px solid var(--dim);
      background: var(--bg2);
      border-radius: 2px;
      overflow: hidden;
      max-height: 220px;
    }
    .review-hdr {
      padding: 8px 14px;
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--dim);
      background: rgba(255,255,255,0.02);
    }
    .review-list { overflow-y: auto; max-height: 175px; }
    .review-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(42,64,96,0.5);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      gap: 12px;
    }
    .review-item:last-child { border-bottom: none; }
    .ri-eng { color: #fff; flex: 1; }
    .ri-arrow { color: var(--dim); font-size: 10px; }
    .ri-bm  { color: var(--correct); flex: 1; text-align: right; }
    .review-empty {
      padding: 16px 14px;
      font-size: 11px;
      color: var(--correct);
      text-align: center;
      letter-spacing: 1px;
    }

    .pa-btn {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid var(--correct);
      color: var(--correct);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      box-shadow: var(--gc);
      margin-top: 4px;
    }
    .pa-btn:hover { background: var(--correct); color: var(--bg); }

    .bk-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
    }
    .bk-btn:hover { border-color: var(--text); color: var(--text); }

    /* ===========================
       ANIMATIONS
    =========================== */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(8px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(6px); }
      75%  { transform: translateX(-4px); }
    }
    .shaking { animation: shake 0.4s ease; }

    @keyframes wordEntrance {
      from { opacity: 0; transform: translateX(-50%) scaleX(0.6); }
      to   { opacity: 1; transform: translateX(-50%) scaleX(1); }
    }
    .word-card { animation: wordEntrance 0.15s ease; }

    /* correct/wrong card flash */
    .word-card.flash-correct { border-color: var(--correct); box-shadow: 0 0 16px rgba(0,240,192,0.6); }
    .word-card.flash-wrong   { border-color: var(--wrong);   box-shadow: 0 0 16px rgba(255,45,85,0.6); }

    /* Scrollbar for review list */
    .review-list::-webkit-scrollbar { width: 4px; }
    .review-list::-webkit-scrollbar-track { background: var(--bg2); }
    .review-list::-webkit-scrollbar-thumb { background: var(--dim); }
  </style>
</head>
<body>
<div id="game-wrapper">

  <!-- ======================== MENU ======================== -->
  <div id="menu-screen" class="screen active">
    <div class="title-block">
      <div class="title-main">WORD<br>DODGE</div>
      <div class="title-sub">English – BM Reaction Game</div>
    </div>

    <div style="width:100%">
      <div class="section-label" style="margin-bottom:10px;">Select Difficulty</div>
      <div class="diff-grid">
        <button class="diff-btn easy sel" onclick="selectDiff('easy')">
          <span class="di">🟢</span>
          <span>EASY</span>
          <span class="ds">Slow pace</span>
        </button>
        <button class="diff-btn medium" onclick="selectDiff('medium')">
          <span class="di">🟡</span>
          <span>MEDIUM</span>
          <span class="ds">Faster</span>
        </button>
        <button class="diff-btn hard" onclick="selectDiff('hard')">
          <span class="di">🔴</span>
          <span>HARD</span>
          <span class="ds">No mercy</span>
        </button>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">▶&nbsp; START GAME</button>

    <div class="hint-box">
      ← → <span>ARROW KEYS</span> &nbsp;/&nbsp; <span>A D</span> to move<br>
      📱 Tap <span>LEFT</span> or <span>RIGHT</span> button below<br>
      <span>✓ BETUL</span> = Correct &nbsp;|&nbsp; <span>SALAH ✗</span> = Wrong
    </div>

    <div class="best-score" id="menu-best">BEST SCORE: 0</div>
  </div>

  <!-- ======================== GAME ======================== -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <div id="score-el">SCORE: 0</div>
      <div id="diff-badge">EASY</div>
      <div id="lives-el">❤️❤️❤️</div>
    </div>

    <div id="play-area">
      <div id="divider"></div>
      <div class="zone-lbl" id="lbl-correct">✓ BETUL</div>
      <div class="zone-lbl" id="lbl-wrong">SALAH ✗</div>
      <div id="zone-hl" class="left"></div>
      <div id="player" class="on-correct"><svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="22" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/><circle cx="28" cy="28" r="13" stroke="currentColor" stroke-width="2"/><circle cx="28" cy="28" r="3.5" fill="currentColor"/><line x1="28" y1="4" x2="28" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="43" x2="28" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="28" x2="13" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="43" y1="28" x2="52" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="17" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/><line x1="39" y1="17" x2="36" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/><line x1="17" y1="39" x2="20" y2="36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/><line x1="39" y1="39" x2="36" y2="36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/></svg></div>
      <div id="flash"></div>
      <div id="countdown-overlay">3</div>
    </div>

    <div id="mobile-ctrl">
      <button class="ctrl-btn" id="btn-l" onpointerdown="movePlayer('left')">
        <span class="ci">◀</span>
        ✓ BETUL
        <span class="ck">← KEY / SWIPE LEFT</span>
      </button>
      <button class="ctrl-btn" id="btn-r" onpointerdown="movePlayer('right')">
        <span class="ci">▶</span>
        SALAH ✗
        <span class="ck">→ KEY / SWIPE RIGHT</span>
      </button>
    </div>
  </div>

  <!-- ======================== GAME OVER ======================== -->
  <div id="gameover-screen" class="screen">
    <div class="go-title">GAME OVER</div>
    <div class="go-score-wrap">
      <div class="go-lbl">Final Score</div>
      <div class="go-score" id="go-score">0</div>
    </div>
    <div class="go-hs" id="go-hs"></div>

    <div class="review-section">
      <div class="review-hdr">📚 Words to Review</div>
      <div class="review-list" id="review-list"></div>
    </div>

    <button class="pa-btn" onclick="startGame()">▶ PLAY AGAIN</button>
    <button class="bk-btn" onclick="showMenu()">← BACK TO MENU</button>
  </div>

</div>

<script>
// =====================================================
//  WORD DATABASE
// =====================================================
const WORDS = {
  easy: [
    { eng: "analyze",   bm: "menganalisis" },
    { eng: "evaluate",  bm: "menilai" },
    { eng: "convey",    bm: "menyampaikan" },
    { eng: "discuss",   bm: "membincangkan" },
    { eng: "explain",   bm: "menjelaskan" },
    { eng: "describe",  bm: "menggambarkan" },
    { eng: "compare",   bm: "membandingkan" },
    { eng: "suggest",   bm: "mencadangkan" },
    { eng: "present",   bm: "membentangkan" },
    { eng: "review",    bm: "mengulas" },
    { eng: "listen",    bm: "mendengar" },
    { eng: "respond",   bm: "bertindak balas" },
    { eng: "argue",     bm: "berhujah" },
    { eng: "conclude",  bm: "menyimpulkan" },
    { eng: "identify",  bm: "mengenal pasti" },
  ],
  medium: [
    { eng: "negotiate",   bm: "berunding" },
    { eng: "persuade",    bm: "memujuk" },
    { eng: "interpret",   bm: "mentafsir" },
    { eng: "collaborate", bm: "bekerjasama" },
    { eng: "communicate", bm: "berkomunikasi" },
    { eng: "elaborate",   bm: "menghuraikan" },
    { eng: "significant", bm: "signifikan" },
    { eng: "assumption",  bm: "andaian" },
    { eng: "proposal",    bm: "cadangan" },
    { eng: "conference",  bm: "persidangan" },
    { eng: "objective",   bm: "objektif" },
    { eng: "conclusion",  bm: "kesimpulan" },
    { eng: "argument",    bm: "hujah" },
    { eng: "evidence",    bm: "bukti" },
    { eng: "feedback",    bm: "maklum balas" },
  ],
  hard: [
    { eng: "ambiguous",    bm: "samar" },
    { eng: "coherent",     bm: "koheren" },
    { eng: "articulate",   bm: "petah" },
    { eng: "paraphrase",   bm: "parafrasa" },
    { eng: "synthesize",   bm: "mensintesis" },
    { eng: "rhetoric",     bm: "retorik" },
    { eng: "empirical",    bm: "empirikal" },
    { eng: "hypothesis",   bm: "hipotesis" },
    { eng: "subsequent",   bm: "berikutnya" },
    { eng: "substantiate", bm: "menguatkan hujah" },
    { eng: "nuance",       bm: "nuansa" },
    { eng: "credibility",  bm: "kredibiliti" },
    { eng: "infer",        bm: "membuat inferens" },
    { eng: "critique",     bm: "mengkritik" },
    { eng: "validate",     bm: "mengesahkan" },
  ]
};

// =====================================================
//  DIFFICULTY CONFIG
// =====================================================
const DIFF_CFG = {
  easy:   { speed: 1.4, spawnMs: 3400, fakeChance: 0.30, maxWords: 1 },
  medium: { speed: 2.4, spawnMs: 2600, fakeChance: 0.40, maxWords: 2 },
  hard:   { speed: 3.8, spawnMs: 1800, fakeChance: 0.45, maxWords: 2 },
};

// =====================================================
//  STATE
// =====================================================
let state       = 'menu';
let score       = 0;
let lives       = 3;
let difficulty  = 'easy';
let playerSide  = 'left';
let words       = [];      // active falling word objects
let wrongLog    = [];      // for review
let lastSpawn   = 0;
let rafId       = null;
let lastTime    = 0;
let fallSpeed   = 1.4;
let spawnMs     = 3400;
let cooldown    = false;
let highScores  = JSON.parse(localStorage.getItem('wdHS') || '{"easy":0,"medium":0,"hard":0}');

// =====================================================
//  SCREEN MANAGEMENT
// =====================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMenu() {
  state = 'menu';
  stopLoop();
  clearWordEls();
  updateMenuBest();
  showScreen('menu-screen');
}

function updateMenuBest() {
  document.getElementById('menu-best').textContent =
    `BEST SCORE (${difficulty.toUpperCase()}): ${highScores[difficulty] || 0}`;
}

function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('sel'));
  document.querySelector(`.diff-btn.${d}`).classList.add('sel');
  updateMenuBest();
}

// =====================================================
//  START GAME (with countdown)
// =====================================================
async function startGame() {
  score       = 0;
  lives       = 3;
  playerSide  = 'left';
  words       = [];
  wrongLog    = [];
  lastSpawn   = 0;
  cooldown    = false;

  const cfg   = DIFF_CFG[difficulty];
  fallSpeed   = cfg.speed;
  spawnMs     = cfg.spawnMs;

  updateHUD();
  setPlayerEl(true);
  setZoneHl();
  setBadge();
  clearWordEls();

  showScreen('game-screen');
  state = 'countdown';

  await doCountdown();

  state    = 'playing';
  lastTime = performance.now();
  rafId    = requestAnimationFrame(loop);
}

async function doCountdown() {
  const el = document.getElementById('countdown-overlay');
  for (const n of ['3', '2', '1', 'GO!']) {
    el.textContent = n;
    el.style.opacity = '1';
    await wait(n === 'GO!' ? 500 : 700);
    el.style.opacity = '0';
    await wait(150);
  }
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function setBadge() {
  const b = document.getElementById('diff-badge');
  const colors = { easy: 'var(--correct)', medium: 'var(--gold)', hard: 'var(--wrong)' };
  b.textContent = difficulty.toUpperCase();
  b.style.borderColor = colors[difficulty];
  b.style.color = colors[difficulty];
}

// =====================================================
//  GAME LOOP
// =====================================================
function loop(ts) {
  if (state !== 'playing') return;

  const delta = Math.min(ts - lastTime, 50);
  lastTime = ts;

  const cfg = DIFF_CFG[difficulty];

  // Spawn
  if ((ts - lastSpawn) > spawnMs && words.length < cfg.maxWords) {
    spawnWord();
    lastSpawn = ts;
  }

  const area = document.getElementById('play-area');
  const areaH = area.offsetHeight;
  const hitY = areaH - 90;

  // Move
  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.y += fallSpeed * (delta / 16);
    w.el.style.top = w.y + 'px';
    if (w.y >= hitY) {
      resolve(w);
      w.el.remove();
      words.splice(i, 1);
    }
  }

  // Scale difficulty with score
  fallSpeed = cfg.speed + score * 0.025;
  spawnMs   = Math.max(
    difficulty === 'hard' ? 1100 : difficulty === 'medium' ? 1500 : 1900,
    cfg.spawnMs - score * 20
  );

  rafId = requestAnimationFrame(loop);
}

function stopLoop() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

// =====================================================
//  WORD SPAWNING
// =====================================================
function getPool() {
  if (difficulty === 'hard')   return [...WORDS.easy, ...WORDS.medium, ...WORDS.hard];
  if (difficulty === 'medium') return [...WORDS.easy, ...WORDS.medium];
  return WORDS.easy;
}

function spawnWord() {
  const pool  = getPool();
  const entry = pool[Math.floor(Math.random() * pool.length)];
  const cfg   = DIFF_CFG[difficulty];
  const isCorrect = Math.random() > cfg.fakeChance;

  let showBm;
  if (isCorrect) {
    showBm = entry.bm;
  } else {
    let other;
    let tries = 0;
    do {
      other = pool[Math.floor(Math.random() * pool.length)];
      tries++;
    } while (other.bm === entry.bm && tries < 20);
    showBm = other.bm;
  }

  const area = document.getElementById('play-area');
  const aw   = area.offsetWidth;
  const xPos = 80 + Math.random() * (aw - 160);

  const el = document.createElement('div');
  el.className = 'word-card';
  el.innerHTML = `<span class="eng">${entry.eng}</span><span class="sep">=</span><span class="bm">${showBm}</span>`;
  el.style.left = xPos + 'px';
  el.style.top  = '-55px';
  area.appendChild(el);

  words.push({ el, y: -55, isCorrect, correctBm: entry.bm, eng: entry.eng });
}

function clearWordEls() {
  document.querySelectorAll('.word-card').forEach(e => e.remove());
  words = [];
}

// =====================================================
//  COLLISION RESOLVE
// =====================================================
function resolve(w) {
  const gotIt = (playerSide === 'left' && w.isCorrect) ||
                (playerSide === 'right' && !w.isCorrect);

  // flash card
  w.el.classList.add(gotIt ? 'flash-correct' : 'flash-wrong');

  if (gotIt) {
    score++;
    updateHUD();
    popFeedback(true, w);
    flashBg('correct');
  } else {
    lives--;
    updateHUD();
    popFeedback(false, w);
    flashBg('wrong');
    shakeGame();
    if (!wrongLog.find(x => x.eng === w.eng)) {
      wrongLog.push({ eng: w.eng, bm: w.correctBm });
    }
    if (lives <= 0) {
      setTimeout(gameOver, 420);
      state = 'ending';
    }
  }
}

// =====================================================
//  PLAYER MOVEMENT
// =====================================================
function movePlayer(side) {
  if (state !== 'playing') return;
  if (cooldown) return;
  playerSide = side;
  setPlayerEl(false);
  setZoneHl();
  // spin animation
  const p = document.getElementById('player');
  p.classList.remove('spinning');
  void p.offsetWidth;
  p.classList.add('spinning');
  cooldown = true;
  setTimeout(() => cooldown = false, 120);
}

function setPlayerEl(instant) {
  const p = document.getElementById('player');
  if (instant) { p.style.transition = 'none'; setTimeout(() => p.style.transition = '', 30); }
  p.className = playerSide === 'left' ? 'on-correct' : 'on-wrong';
}

function setZoneHl() {
  const zh = document.getElementById('zone-hl');
  zh.className = playerSide === 'left' ? 'left' : 'right';
}

// =====================================================
//  FEEDBACK
// =====================================================
function popFeedback(ok, w) {
  const area = document.getElementById('play-area');
  const fb   = document.createElement('div');
  fb.className = 'fb-pop';
  fb.textContent = ok ? '+1 ✓' : '✗ MISS';
  fb.style.color      = ok ? 'var(--correct)' : 'var(--wrong)';
  fb.style.textShadow = ok ? 'var(--gc)' : 'var(--gw)';
  fb.style.left = w.el.style.left;
  fb.style.top  = (w.y - 10) + 'px';
  area.appendChild(fb);
  setTimeout(() => fb.remove(), 700);
}

function flashBg(type) {
  const f = document.getElementById('flash');
  f.style.background = type === 'correct' ? 'rgba(0,240,192,0.12)' : 'rgba(255,45,85,0.18)';
  f.style.opacity    = '1';
  setTimeout(() => f.style.opacity = '0', 160);
}

function shakeGame() {
  const w = document.getElementById('game-wrapper');
  w.classList.remove('shaking');
  void w.offsetWidth; // reflow
  w.classList.add('shaking');
  setTimeout(() => w.classList.remove('shaking'), 400);
}

// =====================================================
//  HUD
// =====================================================
function updateHUD() {
  document.getElementById('score-el').textContent = `SCORE: ${score}`;
  const h = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
  document.getElementById('lives-el').textContent = h;
}

// =====================================================
//  GAME OVER
// =====================================================
function gameOver() {
  state = 'gameover';
  stopLoop();
  clearWordEls();

  const isNew = score > (highScores[difficulty] || 0);
  if (isNew) {
    highScores[difficulty] = score;
    localStorage.setItem('wdHS', JSON.stringify(highScores));
  }

  document.getElementById('go-score').textContent = score;

  const hsEl = document.getElementById('go-hs');
  if (isNew && score > 0) {
    hsEl.textContent  = '🏆 NEW HIGH SCORE!';
    hsEl.style.color  = 'var(--gold)';
    hsEl.style.textShadow = 'var(--gg)';
  } else {
    hsEl.textContent  = `BEST: ${highScores[difficulty]}`;
    hsEl.style.color  = 'var(--dim)';
    hsEl.style.textShadow = 'none';
  }

  // Review list
  const list = document.getElementById('review-list');
  if (wrongLog.length === 0) {
    list.innerHTML = '<div class="review-empty">🎉 Perfect! No mistakes!</div>';
  } else {
    list.innerHTML = wrongLog.map(w =>
      `<div class="review-item">
        <span class="ri-eng">${w.eng}</span>
        <span class="ri-arrow">→</span>
        <span class="ri-bm">${w.bm}</span>
      </div>`
    ).join('');
  }

  showScreen('gameover-screen');
}

// =====================================================
//  INPUT — KEYBOARD
// =====================================================
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') movePlayer('left');
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') movePlayer('right');
  if ((e.key === 'Enter' || e.key === ' ') && state === 'menu') startGame();
});

// =====================================================
//  INPUT — SWIPE
// =====================================================
let touchX = 0;
const gs = document.getElementById('game-screen');
gs.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
gs.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 35) movePlayer(dx < 0 ? 'left' : 'right');
}, { passive: true });

// =====================================================
//  INIT
// =====================================================
updateMenuBest();
</script>
</body>
</html>
