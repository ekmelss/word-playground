<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plural Rush! ⌨️</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFD93D;
      --pink:   #FF6B9D;
      --blue:   #4ECDC4;
      --purple: #A855F7;
      --orange: #FF8C42;
      --green:  #6BCB77;
      --red:    #FF4757;
      --bg:     #FFF9F0;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .bg-shapes { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .shape { position:absolute; border-radius:50%; opacity:0.12; animation: floatShape 8s ease-in-out infinite; }
    .shape:nth-child(1){width:240px;height:240px;background:var(--orange);top:-80px;right:-50px;animation-delay:0s;}
    .shape:nth-child(2){width:180px;height:180px;background:var(--blue);bottom:15%;left:-40px;animation-delay:2s;}
    .shape:nth-child(3){width:150px;height:150px;background:var(--yellow);top:40%;right:5%;animation-delay:3.5s;}
    .shape:nth-child(4){width:200px;height:200px;background:var(--pink);bottom:-70px;left:20%;animation-delay:1s;}
    @keyframes floatShape {
      0%,100%{transform:translateY(0) rotate(0deg);}
      50%{transform:translateY(-30px) rotate(12deg);}
    }

    .wrapper {
      position:relative; z-index:1;
      max-width:520px; margin:0 auto;
      padding:24px 20px 60px;
      display:flex; flex-direction:column; align-items:center; gap:18px;
    }

    .back-btn {
      align-self:flex-start;
      display:flex; align-items:center; gap:6px;
      background:#fff; border:3px solid #eee; border-radius:40px; padding:8px 16px;
      font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; color:#888;
      cursor:pointer; text-decoration:none;
      box-shadow: 0 3px 0 #ddd;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .back-btn:hover { transform:translateY(-2px); box-shadow:0 5px 0 #ddd; }

    /* Header */
    .header { text-align:center; }
    .game-title {
      font-family:'Fredoka One', cursive;
      font-size:clamp(30px,7vw,50px);
      background: linear-gradient(135deg, var(--orange) 0%, var(--pink) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .game-sub { font-size:14px; font-weight:700; color:#aaa; letter-spacing:1px; margin-top:2px; }

    /* Stats row */
    .stats-row { display:flex; gap:10px; width:100%; }
    .stat-box {
      flex:1; background:#fff; border-radius:18px; padding:10px 14px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.07); text-align:center;
      border: 2px solid transparent;
    }
    .stat-box.score-box { border-color:#A855F720; }
    .stat-box.streak-box { border-color:#FFD93D40; }
    .stat-box .st-lbl { font-size:10px; font-weight:800; letter-spacing:1px; color:#bbb; text-transform:uppercase; }
    .stat-box .st-val {
      font-family:'Fredoka One', cursive; font-size:26px; line-height:1.2;
    }
    .score-box .st-val { color:var(--purple); }
    .streak-box .st-val { color:var(--orange); }

    /* Progress */
    .progress-wrap { width:100%; }
    .progress-info { display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:#bbb; margin-bottom:6px; }
    .progress-info .q-num { color:var(--orange); }
    .progress-bar-bg { width:100%; height:12px; background:#eee; border-radius:40px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,0.08); }
    .progress-bar-fill {
      height:100%; border-radius:40px;
      background: linear-gradient(90deg, var(--orange), var(--pink));
      transition: width 0.4s ease;
      box-shadow: 0 2px 8px rgba(255,140,66,0.5);
    }

    /* Timer bar */
    .timer-bar-wrap { width:100%; }
    .timer-bar-bg { width:100%; height:20px; background:#eee; border-radius:40px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,0.08); }
    .timer-bar-fill {
      height:100%; border-radius:40px;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width 0.9s linear, background 0.3s;
    }
    .timer-bar-fill.half   { background: linear-gradient(90deg, var(--yellow), var(--orange)); }
    .timer-bar-fill.urgent { background: linear-gradient(90deg, var(--red), var(--pink)); animation: urgentPulse 0.5s ease-in-out infinite; }
    @keyframes urgentPulse { 0%,100%{opacity:1;}50%{opacity:0.7;} }
    .timer-label { text-align:center; font-size:12px; font-weight:800; color:#aaa; margin-top:4px; }
    .timer-label span { color:var(--orange); font-family:'Fredoka One',cursive; font-size:16px; }

    /* Word card */
    .word-card {
      width:100%; background:#fff; border-radius:28px; padding:32px 24px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 2px 30px rgba(0,0,0,0.05);
      text-align:center;
      position:relative; overflow:hidden;
    }
    .word-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:6px;
      border-radius:28px 28px 0 0;
      background: linear-gradient(90deg, var(--orange), var(--pink));
    }

    .word-prompt { font-size:13px; font-weight:800; color:#ccc; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }

    .main-word {
      font-family:'Fredoka One', cursive;
      font-size:clamp(36px,9vw,58px);
      color:var(--orange);
      text-shadow: 0 4px 0 rgba(255,140,66,0.2);
      margin-bottom:6px;
      animation: wordPop 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes wordPop {
      from { transform:scale(0.7); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }

    .hint-text { font-size:13px; font-weight:700; color:#ccc; margin-bottom:20px; }
    .hint-badge {
      display:inline-block; background:#FFF3E0; color:var(--orange);
      border-radius:20px; padding:4px 12px;
      font-size:12px; font-weight:800;
    }

    /* Input area */
    .input-area { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; }
    .plural-input {
      flex:1; min-width:180px;
      padding:14px 18px; border-radius:18px;
      border: 3px solid #eee;
      font-family:'Fredoka One', cursive; font-size:24px;
      color:#555; outline:none;
      background:#FAFAFA;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align:center;
    }
    .plural-input:focus { border-color:var(--orange); box-shadow:0 0 0 4px rgba(255,140,66,0.15); }
    .plural-input.correct { border-color:var(--green); background:#F0FFF4; color:var(--green); animation: correctShake 0.4s; }
    .plural-input.wrong   { border-color:var(--red);   background:#FFF0F0; color:var(--red);   animation: wrongShake 0.4s; }
    @keyframes correctShake {
      0%,100%{transform:translateY(0);}25%{transform:translateY(-6px);}75%{transform:translateY(-3px);}
    }
    @keyframes wrongShake {
      0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}
    }

    .submit-btn {
      padding:14px 22px; border:none; border-radius:18px; cursor:pointer;
      font-family:'Fredoka One', cursive; font-size:18px; color:#fff;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      box-shadow: 0 5px 0 rgba(255,71,87,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      white-space:nowrap;
    }
    .submit-btn:hover { transform:translateY(-2px); box-shadow:0 7px 0 rgba(255,71,87,0.3); }
    .submit-btn:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(255,71,87,0.3); }

    /* Feedback inline */
    .inline-fb {
      min-height:32px; text-align:center;
      font-family:'Fredoka One', cursive; font-size:18px;
      transition: opacity 0.2s;
    }
    .inline-fb.show-correct { color:var(--green); }
    .inline-fb.show-wrong   { color:var(--red); }

    /* Hint reveal button */
    .hint-btn {
      padding:8px 18px; border:2px solid #eee; border-radius:40px;
      background:#fff; cursor:pointer; font-family:'Nunito',sans-serif;
      font-weight:800; font-size:12px; color:#bbb; letter-spacing:1px;
      transition: all 0.15s;
    }
    .hint-btn:hover { border-color:var(--orange); color:var(--orange); }

    /* Keyboard shortcuts hint */
    .key-hint { font-size:12px; color:#ccc; font-weight:700; text-align:center; }
    .key-hint kbd {
      background:#f0f0f0; border-radius:6px; padding:2px 6px;
      font-family:'Nunito',sans-serif; font-size:11px; color:#999;
      border: 1px solid #ddd;
    }

    /* Results screen */
    #results-screen { display:none; width:100%; }
    .results-card {
      background:#fff; border-radius:28px; padding:28px 24px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.08);
      text-align:center; position:relative; overflow:hidden;
    }
    .results-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:6px;
      background: linear-gradient(90deg, var(--orange), var(--yellow), var(--pink));
    }
    .result-emoji { font-size:60px; margin-bottom:8px; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
    .result-title {
      font-family:'Fredoka One', cursive; font-size:clamp(26px,7vw,40px);
      background: linear-gradient(135deg, var(--orange), var(--pink));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:4px;
    }
    .result-score-big {
      font-family:'Fredoka One', cursive; font-size:clamp(44px,11vw,68px);
      color:var(--orange); line-height:1; margin:10px 0 4px;
    }
    .result-score-label { font-size:13px; font-weight:800; color:#bbb; letter-spacing:2px; text-transform:uppercase; }

    .stars-row { display:flex; justify-content:center; gap:8px; margin:14px 0; font-size:34px; }
    .star { opacity:0.2; transition:opacity 0.3s, transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
    .star.lit { opacity:1; transform:scale(1.25); }

    .review-section { margin-top:18px; text-align:left; }
    .review-title { font-size:12px; font-weight:800; color:#bbb; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
    .review-item {
      display:grid; grid-template-columns: 1fr auto 1fr;
      align-items:center; gap:8px;
      padding:10px 14px; border-radius:14px; margin-bottom:6px;
      font-weight:700; font-size:14px;
    }
    .review-item.corr { background:#F0FFF4; }
    .review-item.wrong-item { background:#FFF0F0; }
    .ri-word { color:#555; }
    .ri-arrow { color:#ccc; text-align:center; font-size:12px; }
    .ri-answer { font-family:'Fredoka One',cursive; font-size:16px; text-align:right; }
    .review-item.corr .ri-answer  { color:var(--green); }
    .review-item.wrong-item .ri-answer { color:var(--red); }
    .ri-correct-lbl { font-size:11px; font-weight:800; color:var(--red); display:block; }

    .play-again-btn {
      width:100%; padding:16px; border:none; border-radius:20px; cursor:pointer;
      font-family:'Fredoka One', cursive; font-size:22px; color:#fff;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      box-shadow: 0 6px 0 rgba(255,71,87,0.3);
      transition: transform 0.1s, box-shadow 0.1s; margin-top:14px;
    }
    .play-again-btn:hover { transform:translateY(-3px); }
    .play-again-btn:active { transform:translateY(3px); }

    @keyframes popIn {
      from { transform:scale(0.5); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape"></div><div class="shape"></div>
    <div class="shape"></div><div class="shape"></div>
  </div>

  <div class="wrapper">
    <a class="back-btn" href="index.html">← Back</a>

    <!-- GAME SCREEN -->
    <div id="game-screen" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div class="header">
        <div class="game-title">Plural Rush! ⌨️</div>
        <div class="game-sub">Type the correct plural form!</div>
      </div>

      <div class="stats-row">
        <div class="stat-box score-box">
          <div class="st-lbl">⭐ Score</div>
          <div class="st-val" id="score-val">0</div>
        </div>
        <div class="stat-box streak-box">
          <div class="st-lbl">🔥 Streak</div>
          <div class="st-val" id="streak-val">0</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>Word <span class="q-num" id="q-num">1 / 8</span></span>
          <span id="q-emoji">🎯</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="timer-bar-wrap">
        <div class="timer-bar-bg">
          <div class="timer-bar-fill" id="timer-bar" style="width:100%"></div>
        </div>
        <div class="timer-label">⏱ <span id="timer-num">15</span>s remaining</div>
      </div>

      <div class="word-card">
        <div class="word-prompt">Type the plural of</div>
        <div class="main-word" id="main-word">baby</div>
        <div class="hint-text">
          <span class="hint-badge" id="rule-badge">-y → -ies</span>
        </div>

        <div class="input-area">
          <input type="text" class="plural-input" id="plural-input"
            placeholder="type here…" autocomplete="off" autocorrect="off"
            spellcheck="false" autocapitalize="off">
          <button class="submit-btn" onclick="submitAnswer()">CHECK ✓</button>
        </div>

        <div class="inline-fb" id="inline-fb"></div>
      </div>

      <button class="hint-btn" id="hint-reveal-btn" onclick="revealHint()">💡 Show Hint</button>
      <div class="hint-text" id="hint-text-reveal" style="opacity:0;transition:opacity 0.3s;"></div>

      <div class="key-hint">Press <kbd>Enter</kbd> to check</div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen">
      <div class="results-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Word Master!</div>
        <div class="result-score-big" id="result-score">0</div>
        <div class="result-score-label">Points Earned</div>

        <div class="stars-row">
          <span class="star" id="star1">⭐</span>
          <span class="star" id="star2">⭐</span>
          <span class="star" id="star3">⭐</span>
        </div>

        <div class="review-section">
          <div class="review-title">📋 Word Review</div>
          <div id="review-list"></div>
        </div>

        <button class="play-again-btn" onclick="restartGame()">🔄 Play Again!</button>
        <a class="back-btn" href="index.html" style="margin-top:12px;display:inline-flex;">🏠 Home</a>
      </div>
    </div>
  </div>

<script>
  const WORDS = [
    { singular: "baby",   plural: "babies",   hint: "Drop -y, add -ies",    rule: "-y → -ies" },
    { singular: "city",   plural: "cities",   hint: "Drop -y, add -ies",    rule: "-y → -ies" },
    { singular: "mouse",  plural: "mice",     hint: "Irregular plural!",    rule: "Irregular" },
    { singular: "party",  plural: "parties",  hint: "Drop -y, add -ies",    rule: "-y → -ies" },
    { singular: "tomato", plural: "tomatoes", hint: "Add -es at the end",   rule: "+ -es" },
    { singular: "child",  plural: "children", hint: "Irregular plural!",    rule: "Irregular" },
    { singular: "man",    plural: "men",      hint: "Vowel change: a → e",  rule: "Irregular" },
    { singular: "goose",  plural: "geese",    hint: "Vowel change: oo → ee",rule: "Irregular" },
  ];

  const TIMER_MAX = 15;
  let current   = 0;
  let score     = 0;
  let streak    = 0;
  let timerVal  = TIMER_MAX;
  let timerInt  = null;
  let answered  = false;
  let hintUsed  = false;
  let log       = [];

  function startTimer() {
    clearInterval(timerInt);
    timerVal = TIMER_MAX;
    updateTimerUI();
    timerInt = setInterval(() => {
      timerVal--;
      updateTimerUI();
      if (timerVal <= 0) {
        clearInterval(timerInt);
        if (!answered) timeOut();
      }
    }, 1000);
  }

  function updateTimerUI() {
    const pct = timerVal / TIMER_MAX * 100;
    const bar = document.getElementById('timer-bar');
    bar.style.width = pct + '%';
    document.getElementById('timer-num').textContent = timerVal;

    if (timerVal <= 4) {
      bar.className = 'timer-bar-fill urgent';
    } else if (timerVal <= 8) {
      bar.className = 'timer-bar-fill half';
    } else {
      bar.className = 'timer-bar-fill';
    }
  }

  function loadWord(idx) {
    answered = false;
    hintUsed = false;
    const w = WORDS[idx];

    document.getElementById('main-word').textContent  = w.singular;
    document.getElementById('rule-badge').textContent = w.rule;
    document.getElementById('q-num').textContent      = `${idx+1} / ${WORDS.length}`;
    document.getElementById('progress-fill').style.width = (idx / WORDS.length * 100) + '%';
    document.getElementById('inline-fb').textContent  = '';
    document.getElementById('inline-fb').className    = 'inline-fb';
    document.getElementById('hint-text-reveal').style.opacity = '0';
    document.getElementById('hint-text-reveal').textContent   = '';
    document.getElementById('hint-reveal-btn').disabled = false;
    document.getElementById('hint-reveal-btn').style.opacity = '1';

    const input = document.getElementById('plural-input');
    input.value = '';
    input.className = 'plural-input';
    input.disabled  = false;
    input.focus();

    // Word pop animation
    const mw = document.getElementById('main-word');
    mw.style.animation = 'none';
    void mw.offsetWidth;
    mw.style.animation = 'wordPop 0.3s cubic-bezier(0.175,0.885,0.32,1.275)';

    startTimer();
  }

  function revealHint() {
    if (answered) return;
    const w = WORDS[current];
    const h = document.getElementById('hint-text-reveal');
    h.textContent = '💡 ' + w.hint;
    h.style.opacity = '1';
    document.getElementById('hint-reveal-btn').disabled = true;
    document.getElementById('hint-reveal-btn').style.opacity = '0.5';
    hintUsed = true;
  }

  function submitAnswer() {
    if (answered) return;
    const input = document.getElementById('plural-input');
    const typed = input.value.trim().toLowerCase();
    if (!typed) { input.focus(); return; }

    answered = true;
    clearInterval(timerInt);

    const w = WORDS[current];
    const isCorrect = typed === w.plural.toLowerCase();
    const timeBonus = Math.ceil(timerVal / TIMER_MAX * 5); // 0-5 bonus for speed
    const hintPenalty = hintUsed ? 2 : 0;

    let pts = 0;
    if (isCorrect) {
      streak++;
      pts = 10 + timeBonus - hintPenalty + (streak > 1 ? Math.min(streak - 1, 5) : 0);
      score += pts;
      document.getElementById('score-val').textContent  = score;
      document.getElementById('streak-val').textContent = streak;

      input.className = 'plural-input correct';
      showFb(true, pts, w);
    } else {
      streak = 0;
      document.getElementById('streak-val').textContent = streak;
      input.className = 'plural-input wrong';
      showFb(false, 0, w);
    }

    log.push({ singular: w.singular, plural: w.plural, typed, isCorrect });

    input.disabled = true;
    setTimeout(() => {
      current++;
      if (current < WORDS.length) loadWord(current);
      else showResults();
    }, 1400);
  }

  function timeOut() {
    answered = true;
    streak = 0;
    document.getElementById('streak-val').textContent = streak;

    const w = WORDS[current];
    log.push({ singular: w.singular, plural: w.plural, typed: '', isCorrect: false });

    const fb = document.getElementById('inline-fb');
    fb.textContent = `⏰ Time's up! Answer: ${w.plural}`;
    fb.className   = 'inline-fb show-wrong';

    const input = document.getElementById('plural-input');
    input.value    = w.plural;
    input.className = 'plural-input wrong';
    input.disabled  = true;

    setTimeout(() => {
      current++;
      if (current < WORDS.length) loadWord(current);
      else showResults();
    }, 1600);
  }

  function showFb(ok, pts, w) {
    const fb = document.getElementById('inline-fb');
    const messages = ok
      ? [`+${pts} pts! 🎉`, `+${pts} pts! Correct! ✅`, `Yes! +${pts} pts! 🔥`]
      : [`Wrong! Answer: "${w.plural}" ❌`, `Oops! It's "${w.plural}" 😅`, `Not quite! "${w.plural}" ❌`];
    fb.textContent = messages[Math.floor(Math.random() * messages.length)];
    fb.className   = `inline-fb ${ok ? 'show-correct' : 'show-wrong'}`;
  }

  function showResults() {
    clearInterval(timerInt);
    document.getElementById('game-screen').style.display   = 'none';
    document.getElementById('results-screen').style.display = 'block';

    document.getElementById('result-score').textContent = score;

    const correct = log.filter(l => l.isCorrect).length;
    const pct     = correct / WORDS.length;
    let emoji, title;
    if (pct === 1)       { emoji='🏆'; title='Word Master!'; }
    else if (pct >= 0.75){ emoji='🎉'; title='Great Job!'; }
    else if (pct >= 0.5) { emoji='💪'; title='Keep Pushing!'; }
    else                  { emoji='📚'; title='Keep Practicing!'; }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent = title;

    setTimeout(() => { if (pct >= 0.34) document.getElementById('star1').classList.add('lit'); }, 300);
    setTimeout(() => { if (pct >= 0.67) document.getElementById('star2').classList.add('lit'); }, 600);
    setTimeout(() => { if (pct === 1)   document.getElementById('star3').classList.add('lit'); }, 900);

    // Review
    const list = document.getElementById('review-list');
    list.innerHTML = log.map(item =>
      `<div class="review-item ${item.isCorrect ? 'corr' : 'wrong-item'}">
        <span class="ri-word">${item.singular}</span>
        <span class="ri-arrow">→</span>
        <span class="ri-answer">
          ${item.isCorrect ? item.plural : `<span style="text-decoration:line-through;opacity:0.5;">${item.typed || '—'}</span>`}
          ${!item.isCorrect ? `<span class="ri-correct-lbl">✓ ${item.plural}</span>` : ''}
        </span>
      </div>`
    ).join('');
  }

  function restartGame() {
    current = 0; score = 0; streak = 0; log = [];
    document.getElementById('score-val').textContent  = '0';
    document.getElementById('streak-val').textContent = '0';
    ['star1','star2','star3'].forEach(id => document.getElementById(id).classList.remove('lit'));
    document.getElementById('game-screen').style.display   = 'flex';
    document.getElementById('results-screen').style.display = 'none';
    loadWord(0);
  }

  document.getElementById('plural-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
  });

  loadWord(0);
</script>
</body>
</html>
